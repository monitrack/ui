name: Telegram notification

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Get Pull Request Number (if available)
        id: pr
        run: |
          if [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          elif [[ "${{ github.event_name }}" == 'push' ]]; then
            PR_NUMBER=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              | jq -r '.[0].number')
            echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          fi

      - name: Telegram Notify
        if: env.PR_NUMBER && github.event_name == 'pull_request'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            A new PR is raised [here](https://github.com/${{ github.repository }}/pull/${{ env.PR_NUMBER }})

      - name: Telegram Notify on Commit to Existing Pull Request
        if: env.PR_NUMBER && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            A new commit is added to the existing PR [here](https://github.com/${{ github.repository }}/pull/${{ env.PR_NUMBER }})
