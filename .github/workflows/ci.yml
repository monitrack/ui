name: Telegram notification

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Get Pull Request Number (if available)
        id: pr
        run: |
          PULL_REQUEST_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}" | jq -r '.pull_request.url')
          PR_NUMBER=$(echo "$PULL_REQUEST_URL" | grep -oE '[0-9]+$' || echo "")
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Check if Pull Request Number is available
        id: check_pr
        run: echo "PR_AVAILABLE=$(if [ -n "$PR_NUMBER" ]; then echo 'true'; else echo 'false'; fi)" >> $GITHUB_ENV

      - name: Telegram Notify on New Pull Request
        if: env.PR_AVAILABLE == 'true' && github.event_name == 'pull_request'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            A new PR is raised [here](https://github.com/${{ github.repository }}/pull/${{ env.PR_NUMBER }})

      - name: Telegram Notify on Commit to Existing Pull Request
        if: env.PR_AVAILABLE == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            A new commit is added to the existing PR [here](https://github.com/${{ github.repository }}/pull/${{ env.PR_NUMBER }})
